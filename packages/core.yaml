            id(${device_name}climate).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::LAST);
          } else if (id(hlouver).active_index() == 8){
            id(${device_name}climate).set_horizontal_swing_state(true);
            id(${device_name}climate).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::CENTER);
            id(${device_name}climate).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::LAST);
          } else if (id(hlouver).active_index() == 9){
            id(${device_name}climate).set_horizontal_swing_state(true);
            id(${device_name}climate).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::RIGHTSIDE);
            id(${device_name}climate).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::LAST);
          }

  # ąĪą║ąŠčĆąŠčüčéčī ą▓ąĄąĮčéąĖą╗čÅčéąŠčĆą░ čü čĆčāčüčüą║ąĖą╝ąĖ ąĮą░ąĘą▓ą░ąĮąĖčÅą╝ąĖ
  - platform: template
    name: Fan Speed
    id: fan_speed
    entity_category: config
    options:
      - "ąÉą▓čéąŠ"
      - "ąØąŠčćąĮąŠą╣"
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "ąóčāčĆą▒ąŠ"
    optimistic: true
    restore_value: true
    on_value:
      then:
        lambda: !lambda |-
          if (id(fan_speed).active_index() == 0)
            id(${device_name}climate).make_call().set_fan_mode(climate::CLIMATE_FAN_AUTO).perform();
          else if (id(fan_speed).active_index() == 1)
            id(${device_name}climate).make_call().set_fan_mode(climate::CLIMATE_FAN_QUIET).perform();
          else if (id(fan_speed).active_index() == 2)
            id(${device_name}climate).make_call().set_fan_mode(climate::CLIMATE_FAN_LOW).perform();
          else if (id(fan_speed).active_index() == 3)
            id(${device_name}climate).make_call().set_fan_mode(climate::CLIMATE_FAN_MIDDLE).perform();
          else if (id(fan_speed).active_index() == 4)
            id(${device_name}climate).make_call().set_fan_mode(climate::CLIMATE_FAN_MEDIUM).perform();
          else if (id(fan_speed).active_index() == 5)
            id(${device_name}climate).make_call().set_fan_mode(climate::CLIMATE_FAN_HIGH).perform();
          else if (id(fan_speed).active_index() == 6)
            id(${device_name}climate).make_call().set_fan_mode(climate::CLIMATE_FAN_FOCUS).perform();
          else if (id(fan_speed).active_index() == 7)
            id(${device_name}climate).make_call().set_fan_mode(climate::CLIMATE_FAN_DIFFUSE).perform();

climate:
  - platform: tclac
    name: "${device_name} Climate"
    id: ${device_name}climate
    supported_fan_modes:
      - "AUTO"
      - "QUIET"
      - "LOW"
      - "MIDDLE"
      - "MEDIUM"
      - "HIGH"
      - "FOCUS"
      - "DIFFUSE"
    supported_swing_modes:
      - "OFF"
    on_state:
      then:
        lambda: !lambda |-
          if (id(${device_name}climate).fan_mode == climate::CLIMATE_FAN_AUTO) id(fan_speed).publish_state("ąÉą▓čéąŠ");
          else if (id(${device_name}climate).fan_mode == climate::CLIMATE_FAN_QUIET) id(fan_speed).publish_state("ąØąŠčćąĮąŠą╣");
          else if (id(${device_name}climate).fan_mode == climate::CLIMATE_FAN_LOW) id(fan_speed).publish_state("1");
          else if (id(${device_name}climate).fan_mode == climate::CLIMATE_FAN_MIDDLE) id(fan_speed).publish_state("2");
          else if (id(${device_name}climate).fan_mode == climate::CLIMATE_FAN_MEDIUM) id(fan_speed).publish_state("3");
          else if (id(${device_name}climate).fan_mode == climate::CLIMATE_FAN_HIGH) id(fan_speed).publish_state("4");
          else if (id(${device_name}climate).fan_mode == climate::CLIMATE_FAN_FOCUS) id(fan_speed).publish_state("5");
          else if (id(${device_name}climate).fan_mode == climate::CLIMATE_FAN_DIFFUSE) id(fan_speed).publish_state("ąóčāčĆą▒ąŠ");