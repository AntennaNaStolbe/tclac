# - ą¤ąĄčĆąĄą║ą╗čÄčćą░čéąĄą╗ąĖ
switch:
  # ą¤ąĖčēą░ą╗ą║ą░ ą┤ą╗čÅ ą┐ąŠą┤čéą▓ąĄčĆąČą┤ąĄąĮąĖčÅ ą║ąŠą╝ą░ąĮą┤, ą┐ąŠ čāą╝ąŠą╗čćą░ąĮąĖčÄ ą▓čŗą║ą╗čÄčćąĄąĮą░
  - name: Beeper
    platform: template
    device_class: switch
    id: beep_mode
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    on_turn_on:
      then:
        lambda: !lambda |-
          id(${device_name}climate).set_beeper_state(true);
    on_turn_off:
      then:
        lambda: !lambda |-
          id(${device_name}climate).set_beeper_state(false);
  
  # ąśąĮą┤ąĖą║ą░čéąŠčĆ čāčüčéą░ą▓ą║ąĖ čéąĄą╝ą┐ąĄčĆą░čéčāčĆčŗ ąĮą░ ą║ąŠčĆą┐čāčüąĄ ą▓ąĮčāčéčĆąĄąĮąĮąĄą│ąŠ ą▒ą╗ąŠą║ą░, ą┐ąŠ čāą╝ąŠą╗čćą░ąĮąĖčÄ ą▓ą║ą╗čÄčćąĄąĮ
  - name: Display
    platform: template
    device_class: switch
    id: display_mode
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    on_turn_on:
      then:
        lambda: !lambda |-
          id(${device_name}climate).set_display_state(true);
    on_turn_off:
      then:
        lambda: !lambda |-
          id(${device_name}climate).set_display_state(false);
  
  # ąĪą▓ąĄčéąŠą┤ąĖąŠą┤ąĮą░čÅ ąĖąĮą┤ąĖą║ą░čåąĖčÅ ąŠą▒ą╝ąĄąĮą░ ą┤ą░ąĮąĮčŗą╝ąĖ čü ą║ąŠąĮą┤ąĖčåąĖąŠąĮąĄčĆąŠą╝, ą┐ąŠ čāą╝ąŠą╗čćą░ąĮąĖčÄ ą▓čŗą║ą╗čÄčćąĄąĮą░
  - name: Display on module
    platform: template
    device_class: switch
    id: ledflash_mode
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    on_turn_on:
      then:
        lambda: !lambda |-
          id(${device_name}climate).set_module_display_state(true);
    on_turn_off:
      then:
        lambda: !lambda |-
          id(${device_name}climate).set_module_display_state(false);
          
  - name: Force config
    platform: template
    device_class: switch
    id: force_mode
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    on_turn_on:
      then:
        lambda: !lambda |-
          id(${device_name}climate).set_force_mode_state(true);
    on_turn_off:
      then:
        lambda: !lambda |-
          id(${device_name}climate).set_force_mode_state(false);

# - ąÆčŗą┐ą░ą┤ą░čÄčēąĖąĄ čüą┐ąĖčüą║ąĖ
select:
  # ąÆąĄčĆčéąĖą║ą░ą╗čīąĮčŗąĄ ąĘą░čüą╗ąŠąĮą║ąĖ (ą┐ąŠą╗ąŠąČąĄąĮąĖąĄ čäąĖą║čüą░čåąĖąĖ + ąĮą░ą┐čĆą░ą▓ą╗ąĄąĮąĖąĄ ą║ą░čćą░ąĮąĖčÅ)
